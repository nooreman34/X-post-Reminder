<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Post Reminder — Emanartistryhub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0a0715;
    --bg-1:#140f28;
    --violet:#7c5cff;
    --cyan:#4fd6ff;
    --magenta:#c04fff;
    --text-hi:#f2eefc;
    --text-lo:#a89fc4;
    --line:rgba(124,92,255,0.25);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, rgba(192,79,255,0.18), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(79,214,255,0.14), transparent 45%),
      var(--bg-0);
    font-family:'Inter',sans-serif;
    color:var(--text-hi);
    padding:28px 18px 60px;
  }
  .wrap{max-width:560px;margin:0 auto;}
  header{margin-bottom:24px;}
  .eyebrow{
    font-size:12px;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--cyan);font-weight:600;margin-bottom:6px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:26px;margin:0 0 4px;
    background:linear-gradient(90deg,var(--text-hi),var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{color:var(--text-lo);font-size:14px;}

  .progress-row{display:flex;align-items:center;gap:12px;margin:20px 0;}
  .progress-track{
    flex:1;height:8px;border-radius:999px;background:rgba(255,255,255,0.06);
    overflow:hidden;border:1px solid var(--line);
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg,var(--violet),var(--cyan));
    border-radius:999px;transition:width .4s ease;
  }
  .day-badge{
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;
    white-space:nowrap;color:var(--text-hi);
  }

  .card{
    background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border:1px solid var(--line);
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
    position:relative;
  }
  .card::before{
    content:"";position:absolute;inset:0;border-radius:16px;padding:1px;
    background:linear-gradient(135deg,rgba(124,92,255,0.5),transparent 40%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
  }
  .card h2{
    font-family:'Space Grotesk',sans-serif;font-size:15px;margin:0 0 12px;
    color:var(--cyan);display:flex;align-items:center;gap:8px;
  }
  .label{
    font-size:11px;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--text-lo);margin:14px 0 6px;font-weight:600;
  }
  .content-box{
    background:rgba(0,0,0,0.28);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px;
    padding:12px 14px;
    font-size:14px;
    line-height:1.55;
    white-space:pre-wrap;
    color:var(--text-hi);
  }
  .copy-btn{
    margin-top:8px;
    background:rgba(124,92,255,0.12);
    border:1px solid var(--line);
    color:var(--cyan);
    font-size:12px;font-weight:600;
    padding:6px 12px;border-radius:8px;
    cursor:pointer;
  }
  .copy-btn:active{transform:scale(0.97);}

  .time-row{display:flex;gap:10px;align-items:center;margin-top:6px;flex-wrap:wrap;}
  input[type="time"]{
    background:rgba(0,0,0,0.3);
    border:1px solid var(--line);
    color:var(--text-hi);
    padding:9px 12px;border-radius:10px;font-size:14px;
    font-family:'Inter',sans-serif;
  }
  .btn{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;font-size:14px;
    padding:11px 18px;border-radius:12px;border:none;
    cursor:pointer;letter-spacing:0.01em;
  }
  .btn-primary{
    background:linear-gradient(90deg,var(--violet),var(--magenta));
    color:white;
  }
  .btn-ghost{
    background:transparent;border:1px solid var(--line);color:var(--text-hi);
  }
  .btn-full{width:100%;margin-top:14px;}
  .status{
    font-size:12px;color:var(--text-lo);margin-top:10px;
  }
  .status.on{color:#7dffb0;}
  .status.off{color:#ff8f8f;}

  .footer-note{
    text-align:center;color:var(--text-lo);font-size:12px;margin-top:20px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Emanartistryhub · Content System</div>
    <h1>X Post Reminder</h1>
    <div class="sub">Daily nudge to post your 30-day content plan</div>
  </header>

  <div class="progress-row">
    <div class="day-badge" id="dayBadge">Day 1 of 30</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:3.3%"></div></div>
  </div>

  <div class="card">
    <h2>⏰ Reminder time</h2>
    <div class="time-row">
      <input type="time" id="timeInput" value="19:30">
      <button class="btn btn-primary" id="enableBtn">Enable reminders</button>
    </div>
    <div class="status off" id="notifStatus">Notifications: off — tap Enable to turn on</div>
  </div>

  <div class="card">
    <h2 id="todayLabel">Today's Post</h2>
    <div class="label">Caption</div>
    <div class="content-box" id="captionBox">Loading...</div>
    <button class="copy-btn" id="copyCaption">Copy caption</button>

    <div class="label">Image prompt</div>
    <div class="content-box" id="promptBox">Loading...</div>
    <button class="copy-btn" id="copyPrompt">Copy prompt</button>

    <button class="btn btn-primary btn-full" id="postedBtn">✓ Posted — move to next day</button>
  </div>

  <div class="footer-note">Best posting window: 7:00–9:30 PM PKT · stay consistent daily</div>
</div>

{c:"30 days of building AI automation in public — and this is\njust the beginning.\n\nIf your business needs faster replies, automated orders,\nor smart workflows — my DMs are open.\n\nLet's build something for you next.", p:"Confident glowing silhouette figure standing before a large network of connected AI nodes, dark purple blue cinematic lighting, inspirational futuristic digital art, no text --ar 16:9"}
];

let state = { day: 1, notifTime: "19:30", notifsOn: false };
let checkInterval = null;
let lastFiredDate = null;

async function loadState(){
  try{
    const res = await window.storage.get('reminder-state', false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state = {...state, ...parsed};
    }
  }catch(e){ /* no saved state yet */ }
  render();
}

async function saveState(){
  try{
    await window.storage.set('reminder-state', JSON.stringify(state), false);
  }catch(e){ console.error('save failed', e); }
}

function render(){
  const idx = (state.day - 1) % 30;
  const item = content[idx];
  document.getElementById('dayBadge').textContent = `Day ${state.day > 30 ? ((state.day-1)%30)+1 : state.day} of 30`;
  document.getElementById('progressFill').style.width = (((idx+1)/30)*100) + '%';
  document.getElementById('todayLabel').textContent = `📝 Day ${idx+1} Post`;
  document.getElementById('captionBox').textContent = item.c;
  document.getElementById('promptBox').textContent = item.p;
  document.getElementById('timeInput').value = state.notifTime;
  updateNotifStatus();
}

function updateNotifStatus(){
  const statusEl = document.getElementById('notifStatus');
  if(state.notifsOn && Notification.permission === 'granted'){
    statusEl.textContent = `Notifications: on — daily reminder at ${state.notifTime}`;
    statusEl.className = 'status on';
    document.getElementById('enableBtn').textContent = 'Update time';
  } else {
    statusEl.textContent = 'Notifications: off — tap Enable to turn on';
    statusEl.className = 'status off';
    document.getElementById('enableBtn').textContent = 'Enable reminders';
  }
}

function startChecking(){
  if(checkInterval) clearInterval(checkInterval);
  checkInterval = setInterval(() => {
    if(!state.notifsOn) return;
    const now = new Date();
    const [h,m] = state.notifTime.split(':').map(Number);
    const todayKey = now.toDateString();
    if(now.getHours() === h && now.getMinutes() === m && lastFiredDate !== todayKey){
      lastFiredDate = todayKey;
      new Notification('Time to post on X 🚀', {
        body: `Day ${((state.day-1)%30)+1} post is ready — open the app to copy it.`
      });
    }
  }, 15000);
}

document.getElementById('enableBtn').addEventListener('click', async () => {
  const time = document.getElementById('timeInput').value;
  if(!time) return;
  state.notifTime = time;
  if(Notification.permission !== 'granted'){
    const perm = await Notification.requestPermission();
    if(perm !== 'granted'){
      updateNotifStatus();
      return;
    }
  }
  state.notifsOn = true;
  await saveState();
  updateNotifStatus();
  startChecking();
});

document.getElementById('postedBtn').addEventListener('click', async () => {
  state.day = state.day >= 30 ? 1 : state.day + 1;
  await saveState();
  render();
});

document.getElementById('copyCaption').addEventListener('click', () => {
  const text = document.getElementById('captionBox').textContent;
  navigator.clipboard.writeText(text);
  const btn = document.getElementById('copyCaption');
  const orig = btn.textContent;
  btn.textContent = 'Copied ✓';
  setTimeout(() => btn.textContent = orig, 1500);
});

document.getElementById('copyPrompt').addEventListener('click', () => {
  const text = document.getElementById('promptBox').textContent;
  navigator.clipboard.writeText(text);
  const btn = document.getElementById('copyPrompt');
  const orig = btn.textContent;
  btn.textContent = 'Copied ✓';
  setTimeout(() => btn.textContent = orig, 1500);
});

loadState().then(() => {
  if(state.notifsOn && Notification.permission === 'granted') startChecking();
});
</script>
</body>
</html>
